name: Extract petsgram zip
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: main

      - name: Set git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

      - name: Ensure unzip installed
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract zip
        run: |
          if [ -f "petsgram_ai_app_release_final.zip" ]; then
            unzip -o petsgram_ai_app_release_final.zip -d .
            git rm -f petsgram_ai_app_release_final.zip || true
            git add .
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Extract petsgram_ai_app_release_final.zip"
              git push origin HEAD:main
            fi
          else
            echo "Zip file not found"
            exit 1
          fi
